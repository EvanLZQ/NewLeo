<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Reset Code</title>
</head>
<body style="margin:0;padding:0;background-color:#f9f9f9;font-family:Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f9f9f9;padding:32px 0;">
    <tr><td align="center">
      <table width="600" cellpadding="0" cellspacing="0" style="max-width:600px;width:100%;background:#ffffff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06);">

        <!-- Header -->
        <tr>
          <td style="background-color:#e7468c;padding:28px 32px;text-align:center;">
            <h1 style="margin:0;color:#ffffff;font-size:26px;letter-spacing:1px;">Eyelovewear</h1>
          </td>
        </tr>

        <!-- Body -->
        <tr>
          <td style="padding:36px 32px;">
            <h2 style="margin:0 0 12px;color:#333333;font-size:22px;">Password Reset Request</h2>
            <p style="margin:0 0 16px;color:#555555;font-size:15px;line-height:1.6;">
              Hi {{ first_name }}, we received a request to reset your password.
            </p>
            <p style="margin:0 0 8px;color:#555555;font-size:15px;line-height:1.6;">
              Your verification code is:
            </p>
            <table cellpadding="0" cellspacing="0" style="margin:16px 0 24px;">
              <tr>
                <td style="background-color:#f4f4f4;border-radius:8px;padding:16px 32px;text-align:center;">
                  <span style="font-size:32px;font-weight:bold;letter-spacing:8px;color:#e7468c;">{{ code }}</span>
                </td>
              </tr>
            </table>
            <p style="margin:0 0 16px;color:#555555;font-size:15px;line-height:1.6;">
              This code expires in <strong>10 minutes</strong>. If you did not request a password reset, you can safely ignore this email.
            </p>
          </td>
        </tr>

        <!-- Divider -->
        <tr><td style="padding:0 32px;"><hr style="border:none;border-top:1px solid #eeeeee;margin:0;" /></td></tr>

        <!-- Footer -->
        <tr>
          <td style="padding:20px 32px;text-align:center;">
            <p style="margin:0;color:#aaaaaa;font-size:12px;">
              &copy; 2026 Eyelovewear &nbsp;|&nbsp;
              <a href="{{ site_url }}" style="color:#e7468c;text-decoration:none;">eyelovewear.com</a>
            </p>
          </td>
        </tr>

      </table>
    </td></tr>
  </table>
</body>
</html>
